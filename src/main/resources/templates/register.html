<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Coffee & Co</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css(v=2.0)}">
</head>

<body class="login-body">

<div class="login-card" style="max-width:500px;">

    <!-- Logo -->
    <img th:src="@{/images/logo.png}" alt="Coffee & Co Logo" class="login-logo">

    <h3 class="text-center mb-1 text-gold">Coffee & Co</h3>
    <p class="text-center text-muted small mb-4">
        Join our Premium Coffee Club
    </p>

    <!-- Error Message -->
    <div th:if="${errorMessage != null}"
         class="alert alert-danger alert-dismissible fade show"
         role="alert">

        <i class="fa-solid fa-triangle-exclamation me-2"></i>

        <span th:text="${errorMessage}"></span>

        <button type="button"
                class="btn-close"
                data-bs-dismiss="alert"></button>

    </div>

    <form th:action="@{/register}" th:object="${user}" method="POST">

        <!-- Full Name -->
        <div class="mb-3">

            <label class="form-label">Full Name</label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="fa-solid fa-user"></i>
                </span>

                <input
                        type="text"
                        class="form-control"
                        th:field="*{fullName}"
                        placeholder="Enter your full name"
                        required>

            </div>

        </div>

        <!-- Email -->
        <div class="mb-3">

            <label class="form-label">Email Address</label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="fa-solid fa-envelope"></i>
                </span>

                <input
                        type="email"
                        class="form-control"
                        th:field="*{email}"
                        placeholder="name@example.com"
                        required>

            </div>

        </div>

        <!-- Password -->
        <div class="mb-3">

            <label class="form-label">Password</label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="fa-solid fa-lock"></i>
                </span>

                <input
                        type="password"
                        class="form-control"
                        th:field="*{password}"
                        placeholder="Enter password"
                        required>

            </div>

        </div>

        <!-- Phone -->
        <div class="mb-4">

            <label class="form-label">Phone Number</label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="fa-solid fa-phone"></i>
                </span>

                <input
                        type="text"
                        class="form-control"
                        th:field="*{phone}"
                        placeholder="+91 9876543210"
                        required>

            </div>

        </div>

        <div class="d-grid">

            <button class="btn btn-gold py-2" type="submit">
                <i class="fa-solid fa-user-plus me-2"></i>
                Sign Up
            </button>

        </div>

    </form>

    <div class="text-center mt-4">

        <span class="text-muted small">
            Already have an account?
        </span>

        <a th:href="@{/login}"
           class="text-gold text-decoration-none fw-bold">
            Login here
        </a>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
