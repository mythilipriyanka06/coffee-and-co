<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: html_head('Manage Orders')}"></head>
<body>

    <!-- Header Navbar -->
    <header th:replace="~{layout/base :: navbar}"></header>

    <main class="container my-4">
        
        <h2 class="text-dark-bean mb-4"><i class="fa-solid fa-receipt text-gold me-2"></i>Order Management Terminal</h2>

        <!-- Success & Error Messages -->
        <div th:if="${success != null}" class="alert alert-success alert-dismissible fade show border-0" role="alert" style="background-color: rgba(46, 204, 113, 0.15); color: #27ae60; border-radius: 12px;">
            <i class="fa-solid fa-circle-check me-2"></i>
            <span th:text="${success}">Success Message</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error != null}" class="alert alert-danger alert-dismissible fade show border-0" role="alert" style="background-color: rgba(231, 76, 60, 0.15); color: #c0392b; border-radius: 12px;">
            <i class="fa-solid fa-circle-exclamation me-2"></i>
            <span th:text="${error}">Error Message</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="glass-card p-4">
            <div th:if="${orders.isEmpty()}" class="text-center py-4">
                <p class="text-muted m-0">No orders registered in the system yet.</p>
            </div>
            <div class="table-responsive" th:if="${!orders.isEmpty()}">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr class="table-dark text-gold">
                            <th scope="col" style="border-radius: 10px 0 0 0;">Bill No.</th>
                            <th scope="col">Customer</th>
                            <th scope="col">Order Date</th>
                            <th scope="col">Total Items</th>
                            <th scope="col">Grand Total</th>
                            <th scope="col">Current Status</th>
                            <th scope="col">Update Status</th>
                            <th scope="col" style="border-radius: 0 10px 0 0;" class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td class="fw-bold" th:text="${order.billNumber}">CC-0000</td>
                            <td>
                                <span class="fw-bold text-dark-bean d-block" th:text="${order.user.fullName}">Customer Name</span>
                                <small class="text-muted" th:text="${order.user.phone}">Phone</small>
                            </td>
                            <td th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy, hh:mm a')}">Date</td>
                            <td th:text="${order.items.size()}">0</td>
                            <td class="fw-bold text-dark-bean" th:text="'₹' + ${#numbers.formatDecimal(order.grandTotal, 1, 2)}">₹0.00</td>
                            <td>
                                <span th:if="${order.status == 'PENDING'}" class="badge bg-warning text-dark"><i class="fa-solid fa-spinner fa-spin me-1"></i>Pending</span>
                                <span th:if="${order.status == 'COMPLETED'}" class="badge bg-success"><i class="fa-solid fa-circle-check me-1"></i>Completed</span>
                                <span th:if="${order.status == 'CANCELLED'}" class="badge bg-danger"><i class="fa-solid fa-circle-xmark me-1"></i>Cancelled</span>
                            </td>
                            <td>
                                <form th:action="@{/admin/orders/status}" method="POST" class="d-flex align-items-center">
                                    <input type="hidden" name="orderId" th:value="${order.id}">
                                    <select name="status" class="form-select form-select-sm me-2" style="width: 120px; border-radius: 30px;">
                                        <option value="PENDING" th:selected="${order.status == 'PENDING'}">Pending</option>
                                        <option value="COMPLETED" th:selected="${order.status == 'COMPLETED'}">Completed</option>
                                        <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">Cancelled</option>
                                    </select>
                                    <button type="submit" class="btn btn-sm btn-gold p-1 px-2 rounded-circle" title="Update"><i class="fa-solid fa-check"></i></button>
                                </form>
                            </td>
                            <td class="text-end">
                                <a th:href="@{/invoice/{billNumber}(billNumber=${order.billNumber})}" class="btn btn-sm btn-outline-gold me-2">
                                    <i class="fa-solid fa-file-invoice"></i> Bill
                                </a>
                                <a th:href="@{/admin/orders/delete/{id}(id=${order.id})}" 
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Are you sure you want to delete this order record? This cannot be undone.');">
                                    <i class="fa-solid fa-trash-can"></i> Delete
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- Footer Include -->
    <footer th:replace="~{layout/base :: footer}"></footer>

</body>
</html>
