<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: html_head('Manage Users')}"></head>
<body>

    <!-- Header Navbar -->
    <header th:replace="~{layout/base :: navbar}"></header>

    <main class="container my-4">
        
        <h2 class="text-dark-bean mb-4"><i class="fa-solid fa-users text-gold me-2"></i>User Accounts Management</h2>

        <!-- Success & Error Messages -->
        <div th:if="${success != null}" class="alert alert-success alert-dismissible fade show border-0" role="alert" style="background-color: rgba(46, 204, 113, 0.15); color: #27ae60; border-radius: 12px;">
            <i class="fa-solid fa-circle-check me-2"></i>
            <span th:text="${success}">Success Message</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error != null}" class="alert alert-danger alert-dismissible fade show border-0" role="alert" style="background-color: rgba(231, 76, 60, 0.15); color: #c0392b; border-radius: 12px;">
            <i class="fa-solid fa-circle-exclamation me-2"></i>
            <span th:text="${error}">Error Message</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="glass-card p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr class="table-dark text-gold">
                            <th scope="col" style="border-radius: 10px 0 0 0;">ID</th>
                            <th scope="col">Full Name</th>
                            <th scope="col">Email Address</th>
                            <th scope="col">Phone</th>
                            <th scope="col">Account Role</th>
                            <th scope="col">Created Date</th>
                            <th scope="col" style="border-radius: 0 10px 0 0;" class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${users}">
                            <td class="fw-bold" th:text="${u.id}">1</td>
                            <td class="fw-bold text-dark-bean" th:text="${u.fullName}">User Name</td>
                            <td th:text="${u.email}">user@example.com</td>
                            <td th:text="${u.phone != null ? u.phone : '-'}">-</td>
                            <td>
                                <span th:if="${u.role == 'ADMIN'}" class="badge bg-dark border border-gold text-gold"><i class="fa-solid fa-user-shield me-1"></i>ADMIN</span>
                                <span th:if="${u.role == 'CUSTOMER'}" class="badge bg-secondary"><i class="fa-solid fa-user me-1"></i>CUSTOMER</span>
                            </td>
                            <td th:text="${#temporals.format(u.createdAt, 'dd MMM yyyy')}">Date</td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-gold me-2 btn-edit-user" 
                                        data-bs-toggle="modal" 
                                        data-bs-target="#editUserModal"
                                        th:data-id="${u.id}"
                                        th:data-role="${u.role}">
                                    <i class="fa-solid fa-user-gear"></i> Edit Role
                                </button>
                                <a th:href="@{/admin/users/delete/{id}(id=${u.id})}" 
                                   class="btn btn-sm btn-outline-danger"
                                   th:if="${u.email != session.user.email}"
                                   onclick="return confirm('Are you sure you want to delete this user account? All associated orders will remain for historical logging.');">
                                    <i class="fa-solid fa-trash-can"></i> Delete
                                </a>
                                <span th:if="${u.email == session.user.email}" class="text-muted small italic">(Logged In)</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- EDIT USER ROLE MODAL -->
        <div class="modal fade" id="editUserModal" tabindex="-1" aria-labelledby="editUserModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content glass-card p-2" style="background: white; border-radius: 20px;">
                    <div class="modal-header border-bottom-0 pb-0">
                        <h5 class="modal-title text-dark-bean fw-bold" id="editUserModalLabel">Edit User Role</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/admin/users/edit}" method="POST">
                        <div class="modal-body">
                            <input type="hidden" id="editUserId" name="userId">
                            <div class="mb-3">
                                <label for="editUserRole" class="form-label fw-bold text-dark-bean small">Account Role</label>
                                <select class="form-select" id="editUserRole" name="role" required>
                                    <option value="CUSTOMER">CUSTOMER</option>
                                    <option value="ADMIN">ADMIN</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer border-top-0 pt-0">
                            <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-gold">Update Role</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer Include -->
    <footer th:replace="~{layout/base :: footer}"></footer>

</body>
</html>
