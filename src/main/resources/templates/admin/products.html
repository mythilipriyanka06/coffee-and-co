<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: html_head('Manage Products')}"></head>
<body>

    <!-- Header Navbar -->
    <header th:replace="~{layout/base :: navbar}"></header>

    <main class="container my-4">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-dark-bean m-0"><i class="fa-solid fa-coffee-bean text-gold me-2"></i>Product Management</h2>
            <button class="btn btn-gold" data-bs-toggle="modal" data-bs-target="#addProductModal">
                <i class="fa-solid fa-plus me-2"></i>Add Product
            </button>
        </div>

        <!-- Success & Error Messages -->
        <div th:if="${success != null}" class="alert alert-success alert-dismissible fade show border-0" role="alert" style="background-color: rgba(46, 204, 113, 0.15); color: #27ae60; border-radius: 12px;">
            <i class="fa-solid fa-circle-check me-2"></i>
            <span th:text="${success}">Success Message</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error != null}" class="alert alert-danger alert-dismissible fade show border-0" role="alert" style="background-color: rgba(231, 76, 60, 0.15); color: #c0392b; border-radius: 12px;">
            <i class="fa-solid fa-circle-exclamation me-2"></i>
            <span th:text="${error}">Error Message</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Products Table -->
        <div class="glass-card p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr class="table-dark text-gold">
                            <th scope="col" style="border-radius: 10px 0 0 0;">Item</th>
                            <th scope="col">Category</th>
                            <th scope="col">Price</th>
                            <th scope="col">Stock</th>
                            <th scope="col">Availability</th>
                            <th scope="col" style="border-radius: 0 10px 0 0;" class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="prod : ${products}">
                            <td>
                                <div class="d-flex align-items-center">
                                    <img th:src="@{${prod.imagePath}}" class="rounded me-3" style="width: 50px; height: 50px; object-fit: cover; border: 1px solid var(--primary-soft);">
                                    <div>
                                        <h6 class="mb-0 fw-bold text-dark-bean" th:text="${prod.name}">Product Name</h6>
                                        <small class="text-muted d-block" th:text="${#strings.abbreviate(prod.description, 45)}">Description</small>
                                    </div>
                                </div>
                            </td>
                            <td th:text="${prod.category.name}">Category</td>
                            <td class="fw-bold text-dark-bean" th:text="'₹' + ${#numbers.formatDecimal(prod.price, 1, 2)}">₹0.00</td>
                            <td th:text="${prod.stock}">0</td>
                            <td>
                                <span th:if="${prod.available}" class="badge bg-success">Available</span>
                                <span th:if="${!prod.available}" class="badge bg-danger">Unavailable</span>
                            </td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-gold me-2 btn-edit-product" 
                                        data-bs-toggle="modal" 
                                        data-bs-target="#editProductModal"
                                        th:data-id="${prod.id}"
                                        th:data-name="${prod.name}"
                                        th:data-desc="${prod.description}"
                                        th:data-price="${prod.price}"
                                        th:data-stock="${prod.stock}"
                                        th:data-available="${prod.available}"
                                        th:data-category-id="${prod.category.id}"
                                        th:data-image-path="${prod.imagePath}">
                                    <i class="fa-solid fa-pen-to-square"></i> Edit
                                </button>
                                <a th:href="@{/admin/products/delete/{id}(id=${prod.id})}" 
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Are you sure you want to delete this product?');">
                                    <i class="fa-solid fa-trash-can"></i> Delete
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ADD PRODUCT MODAL -->
        <div class="modal fade" id="addProductModal" tabindex="-1" aria-labelledby="addProductModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content glass-card p-2" style="background: white; border-radius: 20px;">
                    <div class="modal-header border-bottom-0 pb-0">
                        <h5 class="modal-title text-dark-bean fw-bold" id="addProductModalLabel">Add New Product</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/admin/products/add}" th:object="${product}" method="POST">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="productName" class="form-label fw-bold text-dark-bean small">Product Name</label>
                                <input type="text" class="form-control" id="productName" th:field="*{name}" required placeholder="e.g. Mocha Bliss">
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="productPrice" class="form-label fw-bold text-dark-bean small">Price (₹)</label>
                                    <input type="number" step="0.01" class="form-control" id="productPrice" th:field="*{price}" required placeholder="0.00">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="productStock" class="form-label fw-bold text-dark-bean small">Stock Qty</label>
                                    <input type="number" class="form-control" id="productStock" th:field="*{stock}" required placeholder="0">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="productCategory" class="form-label fw-bold text-dark-bean small">Category</label>
                                <select class="form-select" id="productCategory" name="categoryId" required>
                                    <option value="" disabled selected>Select category...</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="productImagePath" class="form-label fw-bold text-dark-bean small">Image Asset URL/Path</label>
                                <input type="text" class="form-control" id="productImagePath" th:field="*{imagePath}" placeholder="/images/products/classic_espresso.jpg">
                                <small class="text-muted d-block mt-1">E.g., /images/products/mocha_bliss.jpg</small>
                            </div>
                            <div class="mb-3">
                                <label for="productDescription" class="form-label fw-bold text-dark-bean small">Description</label>
                                <textarea class="form-control" id="productDescription" th:field="*{description}" rows="3" placeholder="Description of the menu item..."></textarea>
                            </div>
                        </div>
                        <div class="modal-footer border-top-0 pt-0">
                            <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-gold">Save Product</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- EDIT PRODUCT MODAL -->
        <div class="modal fade" id="editProductModal" tabindex="-1" aria-labelledby="editProductModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content glass-card p-2" style="background: white; border-radius: 20px;">
                    <div class="modal-header border-bottom-0 pb-0">
                        <h5 class="modal-title text-dark-bean fw-bold" id="editProductModalLabel">Edit Product</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/admin/products/edit}" method="POST">
                        <div class="modal-body">
                            <input type="hidden" id="editProductId" name="id">
                            <div class="mb-3">
                                <label for="editProductName" class="form-label fw-bold text-dark-bean small">Product Name</label>
                                <input type="text" class="form-control" id="editProductName" name="name" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="editProductPrice" class="form-label fw-bold text-dark-bean small">Price (₹)</label>
                                    <input type="number" step="0.01" class="form-control" id="editProductPrice" name="price" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="editProductStock" class="form-label fw-bold text-dark-bean small">Stock Qty</label>
                                    <input type="number" class="form-control" id="editProductStock" name="stock" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="editProductCategory" class="form-label fw-bold text-dark-bean small">Category</label>
                                    <select class="form-select" id="editProductCategory" name="categoryId" required>
                                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="editProductAvailable" class="form-label fw-bold text-dark-bean small">Availability</label>
                                    <select class="form-select" id="editProductAvailable" name="available">
                                        <option value="true">Available</option>
                                        <option value="false">Unavailable</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="editProductImagePath" class="form-label fw-bold text-dark-bean small">Image Asset URL/Path</label>
                                <input type="text" class="form-control" id="editProductImagePath" name="imagePath">
                            </div>
                            <div class="mb-3">
                                <label for="editProductDescription" class="form-label fw-bold text-dark-bean small">Description</label>
                                <textarea class="form-control" id="editProductDescription" name="description" rows="3"></textarea>
                            </div>
                        </div>
                        <div class="modal-footer border-top-0 pt-0">
                            <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-gold">Update Product</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer Include -->
    <footer th:replace="~{layout/base :: footer}"></footer>

</body>
</html>
