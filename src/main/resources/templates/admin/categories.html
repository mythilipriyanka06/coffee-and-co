<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: html_head('Manage Categories')}"></head>
<body>

    <!-- Header Navbar -->
    <header th:replace="~{layout/base :: navbar}"></header>

    <main class="container my-4">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-dark-bean m-0"><i class="fa-solid fa-list text-gold me-2"></i>Category Management</h2>
            <button class="btn btn-gold" data-bs-toggle="modal" data-bs-target="#addCategoryModal">
                <i class="fa-solid fa-plus me-2"></i>Add Category
            </button>
        </div>

        <!-- Success & Error Messages -->
        <div th:if="${success != null}" class="alert alert-success alert-dismissible fade show border-0" role="alert" style="background-color: rgba(46, 204, 113, 0.15); color: #27ae60; border-radius: 12px;">
            <i class="fa-solid fa-circle-check me-2"></i>
            <span th:text="${success}">Success Message</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error != null}" class="alert alert-danger alert-dismissible fade show border-0" role="alert" style="background-color: rgba(231, 76, 60, 0.15); color: #c0392b; border-radius: 12px;">
            <i class="fa-solid fa-circle-exclamation me-2"></i>
            <span th:text="${error}">Error Message</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Categories Table -->
        <div class="glass-card p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr class="table-dark text-gold">
                            <th scope="col" style="width: 10%; border-radius: 10px 0 0 0;">ID</th>
                            <th scope="col" style="width: 30%;">Category Name</th>
                            <th scope="col" style="width: 40%;">Description</th>
                            <th scope="col" style="width: 20%; border-radius: 0 10px 0 0;" class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat : ${categories}">
                            <td class="fw-bold" th:text="${cat.id}">1</td>
                            <td class="fw-bold text-dark-bean" th:text="${cat.name}">Hot Coffee</td>
                            <td class="text-muted" th:text="${cat.description}">Category description</td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-gold me-2 btn-edit-category" 
                                        data-bs-toggle="modal" 
                                        data-bs-target="#editCategoryModal"
                                        th:data-id="${cat.id}"
                                        th:data-name="${cat.name}"
                                        th:data-desc="${cat.description}">
                                    <i class="fa-solid fa-pen-to-square"></i> Edit
                                </button>
                                <a th:href="@{/admin/categories/delete/{id}(id=${cat.id})}" 
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Are you sure you want to delete this category? All associated products may be affected.');">
                                    <i class="fa-solid fa-trash-can"></i> Delete
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ADD CATEGORY MODAL -->
        <div class="modal fade" id="addCategoryModal" tabindex="-1" aria-labelledby="addCategoryModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content glass-card p-2" style="background: white; border-radius: 20px;">
                    <div class="modal-header border-bottom-0 pb-0">
                        <h5 class="modal-title text-dark-bean fw-bold" id="addCategoryModalLabel">Add New Category</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/admin/categories/add}" th:object="${category}" method="POST">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="categoryName" class="form-label fw-bold text-dark-bean small">Category Name</label>
                                <input type="text" class="form-control" id="categoryName" th:field="*{name}" required placeholder="e.g. Pastries">
                            </div>
                            <div class="mb-3">
                                <label for="categoryDescription" class="form-label fw-bold text-dark-bean small">Description</label>
                                <textarea class="form-control" id="categoryDescription" th:field="*{description}" rows="3" placeholder="Category description..."></textarea>
                            </div>
                        </div>
                        <div class="modal-footer border-top-0 pt-0">
                            <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-gold">Save Category</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- EDIT CATEGORY MODAL -->
        <div class="modal fade" id="editCategoryModal" tabindex="-1" aria-labelledby="editCategoryModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content glass-card p-2" style="background: white; border-radius: 20px;">
                    <div class="modal-header border-bottom-0 pb-0">
                        <h5 class="modal-title text-dark-bean fw-bold" id="editCategoryModalLabel">Edit Category</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/admin/categories/edit}" method="POST">
                        <div class="modal-body">
                            <input type="hidden" id="editCategoryId" name="id">
                            <div class="mb-3">
                                <label for="editCategoryName" class="form-label fw-bold text-dark-bean small">Category Name</label>
                                <input type="text" class="form-control" id="editCategoryName" name="name" required>
                            </div>
                            <div class="mb-3">
                                <label for="editCategoryDescription" class="form-label fw-bold text-dark-bean small">Description</label>
                                <textarea class="form-control" id="editCategoryDescription" name="description" rows="3"></textarea>
                            </div>
                        </div>
                        <div class="modal-footer border-top-0 pt-0">
                            <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-gold">Update Category</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer Include -->
    <footer th:replace="~{layout/base :: footer}"></footer>

</body>
</html>
