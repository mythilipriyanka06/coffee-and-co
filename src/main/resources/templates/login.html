<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Coffee & Co</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css(v=2.0)}">
</head>

<body class="login-body">

<div class="login-card">

    <!-- Logo -->
    <img th:src="@{/images/logo.png}" alt="Coffee & Co Logo" class="login-logo">

    <h3 class="text-center mb-2 text-gold">Coffee & Co</h3>
    <p class="text-center text-muted mb-4">Brewing Premium Experiences</p>

    <!-- Error Message -->
    <div th:if="${errorMessage != null}"
         class="alert alert-danger alert-dismissible fade show"
         role="alert">

        <i class="fa-solid fa-triangle-exclamation"></i>
        <span th:text="${errorMessage}"></span>

        <button type="button"
                class="btn-close"
                data-bs-dismiss="alert"></button>
    </div>

    <!-- Login Form -->
    <form th:action="@{/login}" method="post">

        <div class="mb-3">
            <label class="form-label">Email Address</label>

            <div class="input-group">
                <span class="input-group-text">
                    <i class="fa-solid fa-envelope"></i>
                </span>

                <input type="email"
                       class="form-control"
                       name="email"
                       placeholder="Enter Email"
                       required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Password</label>

            <div class="input-group">
                <span class="input-group-text">
                    <i class="fa-solid fa-lock"></i>
                </span>

                <input type="password"
                       class="form-control"
                       name="password"
                       placeholder="Enter Password"
                       required>
            </div>
        </div>

        <div class="d-grid">
            <button type="submit" class="btn btn-gold">
                <i class="fa-solid fa-right-to-bracket"></i>
                Login
            </button>
        </div>

    </form>

    <div class="text-center mt-4">
        <span>Don't have an account?</span>
        <a th:href="@{/register}" class="text-gold">
            Register Here
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
